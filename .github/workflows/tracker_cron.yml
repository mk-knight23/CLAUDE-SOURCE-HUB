name: Claude Source Hub Tracker (FORGE Phase)

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch: # Enable manual triggering

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Tracker Engine (HERMES/FORGE automation)
        run: |
          python3 agents_local/tracker_engine.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/tracked_repos.json
          git commit -m "forge(automation): Automated repository ecosystem sync" || exit 0
          git push
